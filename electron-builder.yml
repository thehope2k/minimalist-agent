appId: do.thehope.minimalist-agent
productName: Minimalist Agent
copyright: Copyright © 2026 The Hope

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json
  - "!**/*.map"
  # Bundled ripgrep binary — must be included so asarUnpack can extract it.
  - "node_modules/@vscode/ripgrep-*/bin/**"
  # node-pty native addon.
  - "node_modules/node-pty/**"
  # sherpa-onnx-node native addon (voice dictation) + its per-platform binary packages.
  - "node_modules/sherpa-onnx-node/**"
  - "node_modules/sherpa-onnx-darwin-arm64/**"
  - "node_modules/sherpa-onnx-darwin-x64/**"
  - "node_modules/sherpa-onnx-win-x64/**"
  - "node_modules/sherpa-onnx-linux-x64/**"
  - "node_modules/sherpa-onnx-linux-arm64/**"

asarUnpack:
  # rg must be a real executable on disk, not inside the asar virtual archive.
  - "node_modules/@vscode/ripgrep-*/bin/**"
  # node-pty native addon must also be on disk (not inside asar).
  - "node_modules/node-pty/build/Release/**"
  - "node_modules/node-pty/lib/**"
  - "node_modules/node-pty/package.json"
  # sherpa-onnx native addon + dylibs/dll/so must also be on disk (not inside asar).
  - "node_modules/sherpa-onnx-node/**"
  - "node_modules/sherpa-onnx-darwin-arm64/**"
  - "node_modules/sherpa-onnx-darwin-x64/**"
  - "node_modules/sherpa-onnx-win-x64/**"
  - "node_modules/sherpa-onnx-linux-x64/**"
  - "node_modules/sherpa-onnx-linux-arm64/**"

# Auto-update reads update manifests (latest-mac.yml / latest.yml / latest-linux.yml)
# from the GitHub Releases of this repo.
publish:
  provider: github
  owner: thehope2k
  repo: minimalist-agent

mac:
  category: public.app-category.developer-tools
  target:
    # zip is REQUIRED by electron-updater for macOS auto-update.
    # dmg is shipped for first-time install convenience.
    - target: zip
      arch:
        - arm64
        - x64
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # TCC (privacy) requires a usage-description string before any mic API call
  # is allowed, signed or not — without it, macOS terminates the process on
  # first getUserMedia({ audio: true }) instead of just denying it.
  extendInfo:
    NSMicrophoneUsageDescription: "Minimalist Agent uses your microphone only for on-device voice dictation into the chat input — audio never leaves your machine."
  artifactName: "Minimalist-Agent-${arch}.${ext}"
  # Code signing & notarization disabled — see README. Set CSC_LINK + APPLE_ID
  # + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID to enable; auto-update on
  # macOS will not work end-to-end until then.
  identity: null

dmg:
  artifactName: "Minimalist-Agent-${arch}.dmg"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "Minimalist-Agent-${arch}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false

linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "Minimalist-Agent-${arch}.${ext}"
